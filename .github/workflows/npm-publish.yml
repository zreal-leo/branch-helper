name: Publish Package

on:
    push:
        branches:
            - main

permissions:
    id-token: write # Required for OIDC
    contents: read

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v2.
              with:
                  version: latest
            - uses: actions/setup-node@v6
              with:
                  node-version: "24"
                  registry-url: "https://registry.npmjs.org"
            - run: pnpm i
            - run: npm publish
